name: Build EXE - Windows 7 Compatible

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python 3.8 este ULTIMA versiune compatibila cu Windows 7
      - name: Setup Python 3.8 (Windows 7 compatible)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2
          pip install pyinstaller-hooks-contrib

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile ^
            --windowed ^
            --name "YO_Log_PRO_v16.5" ^
            --icon "icon.ico" ^
            --add-data "contests.json;." ^
            yo_log_pro.py
        shell: cmd
        continue-on-error: false

      - name: Build EXE (fallback fara icon/date)
        if: failure()
        run: |
          pyinstaller --onefile --windowed --name "YO_Log_PRO_v16.5" yo_log_pro.py
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: YO_Log_PRO_Windows7_Compatible
          path: dist/YO_Log_PRO_v16.5.exe
          retention-days: 30

      - name: Create Release (doar pe push la main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v16.5-${{ github.run_number }}
          name: "YO Log PRO v16.5 (Windows 7 Compatible)"
          body: |
            ## YO Log PRO v16.5
            **Construit cu Python 3.8 — compatibil cu Windows 7, 8, 10, 11**
            
            ### Descărcare
            - `YO_Log_PRO_v16.5.exe` — executabil standalone, nu necesită instalare Python
            
            ### Cerinte sistem
            - Windows 7 SP1 sau mai nou (32/64 bit)
            - Nu necesită instalare suplimentară
            
            Dezvoltat de: Ardei Constantin-Cătălin (YO8ACR)
          files: dist/YO_Log_PRO_v16.5.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
